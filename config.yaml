# =====================================================================
# Casa Radar — configuração das pesquisas (edita à vontade, sem tocar
# no código; a corrida seguinte lê este ficheiro do zero).
#
# Cada pesquisa aceita duas formas, misturáveis:
#   1) Filtros estruturados (locations, price_max, ...) -> o sistema
#      constrói o URL de cada portal.
#   2) start_urls colados do browser (com TODOS os filtros finos) ->
#      têm PRIORIDADE quando presentes. É a forma mais fiável.
#
# Segredos (SMTP, CallMeBot, Telegram) NUNCA aqui — só em variáveis
# de ambiente / GitHub Secrets (ver .env.example e README).
# =====================================================================

searches:
  - name: "Casa Feira"
    operation: buy                 # buy | rent
    locations: ["Santa Maria da Feira", "Fiães", "Lourosa"]
    price_max: 450000
    # NOTA: estes filtros estruturados só se aplicam às fontes SEM start_url
    # (neste momento: supercasa). Nas fontes com start_url colado, o URL é o
    # filtro — evita conflitos entre os dois.
    price_min: 220000
    typologies: ["T3", "T4", "T5", "T6"]
    min_area_m2: 120
    property_types: ["moradia"]    # só moradias (tira esta linha p/ incluir apartamentos)
    keywords_exclude: ["trespasse", "leilão", "penhora"]
    # supercasa e o idealista por scraping bloqueiam os IPs do GitHub Actions
    # (DataDome/403). O idealista entra na mesma, via API (idealista_api, ver
    # idealista_urls abaixo). O scraping do supercasa/idealista fica para o
    # dia em que isto corra num IP de casa.
    sources: ["imovirtual", "custojusto", "idealista_api"]
    # start_urls: cola aqui o URL do portal já filtrado no browser.
    # Tem prioridade sobre os filtros estruturados para esse portal.
    start_urls:
      idealista: "https://www.idealista.pt/areas/comprar-casas/com-preco-max_500000,preco-min_260000,tamanho-min_120,moradias,t3,t4-t5/?shape=%28%28_ftxFbq%7Cs%40inYw_Cs%40_hd%40j%7CHojCnkFtaBro%40xlDlyDvXxsBst%40%3F%7CgXyw%40tvK%29%29&ordem=atualizado-desc"    # opcional
      # limit=72 (máximo do portal) e by=LATEST (mais recentes primeiro — crítico,
      # porque o radar só lê as primeiras páginas em cada corrida)
      imovirtual: "https://www.imovirtual.com/pt/resultados/comprar/moradia/todo-o-pais?limit=72&ownerTypeSingleSelect=ALL&priceMin=230000&priceMax=500000&areaMin=140&roomsNumber=%5BFOUR%2CFIVE%2CSIX_OR_MORE%5D&by=LATEST&direction=DESC&mapBounds=-8.252593066942879%2C41.075904031835265%2C-8.71831779913139%2C40.85625729852924&geometry=oznyFfwxs%40eVqpWxn%40coIhzAsqDldBiyAjPwDhSbTqZ%7B%40p%7EBo%7C%40fc%40uFtnBjNxkB%7C%60Blm%40j%7E%40v%7EAftHtWthH%3FfdGaL%7CrFkp%40dtEy%7E%40dRw%7EA%3F%7DxAaVgqE%7DWo%7BCgi%40%7BbCgRz%5Era%40"
      # supercasa: "https://supercasa.pt/comprar-casas/..."
      custojusto: "https://www.custojusto.pt/aveiro/imobiliario/moradias-venda?ps=220000&pe=500000&ros=6&si=1&ss=130"

    # idealista via API (idealista17 na RapidAPI). Cola aqui os teus URLs de
    # pesquisa do idealista.pt (um por concelho, já com os filtros aplicados no
    # browser). NOTA: a API NÃO aceita URLs de polígono (/areas/?shape=) — têm
    # de ser os URLs normais por localidade, como estes.
    # QUOTA: cada URL = 1 pedido. Para não estourar o plano grátis, o sistema
    # roda entre os URLs (idealista_urls_per_run em runtime) — não bate nos 6 de
    # cada vez. Ver a conta em runtime.
    idealista_urls:
      - "https://www.idealista.pt/comprar-casas/santa-maria-da-feira/com-preco-max_500000,preco-min_220000,tamanho-min_120,moradias,t3,t4-t5,publicado_ultimo-mes/?ordem=atualizado-desc"
      - "https://www.idealista.pt/comprar-casas/ovar/com-preco-max_500000,preco-min_220000,tamanho-min_120,moradias,t3,t4-t5,publicado_ultimo-mes/?ordem=atualizado-desc"
      - "https://www.idealista.pt/comprar-casas/espinho/com-preco-max_500000,preco-min_220000,tamanho-min_120,moradias,t3,t4-t5,publicado_ultimo-mes/?ordem=atualizado-desc"
      - "https://www.idealista.pt/comprar-casas/vila-nova-de-gaia/com-preco-max_500000,preco-min_220000,tamanho-min_120,moradias,t3,t4-t5,publicado_ultimo-mes/?ordem=atualizado-desc"
      - "https://www.idealista.pt/comprar-casas/arouca/com-preco-max_500000,preco-min_220000,tamanho-min_120,moradias,t3,t4-t5,publicado_ultimo-mes/?ordem=atualizado-desc"
      - "https://www.idealista.pt/comprar-casas/sao-joao-da-madeira/com-preco-max_500000,preco-min_220000,tamanho-min_120,moradias,t3,t4-t5,publicado_ultimo-mes/?ordem=atualizado-desc"

  # Exemplo de segunda pesquisa (arrendamento) — descomenta e ajusta se um dia
  # precisares; cada pesquisa é independente e tem baseline próprio:
  # - name: "Arrendamento Aveiro"
  #   operation: rent
  #   locations: ["Aveiro"]
  #   price_max: 900
  #   typologies: ["T2"]
  #   property_types: ["apartamento"]
  #   sources: ["imovirtual", "custojusto"]

# "casasapo" está pronto mas desligado por defeito (partilha backend
# com o supercasa — daria duplicados). Para o ligar, acrescenta
# "casasapo" à lista de sources de uma pesquisa.

notifications:
  email:    { enabled: true,  to: "eu@exemplo.com" }   # EMAIL_TO (secret) tem prioridade
  whatsapp: { enabled: true,  provider: callmebot }
  telegram: { enabled: false }

runtime:
  max_pages_per_source: 3        # 3 x 72 = 216 anúncios de cobertura no imovirtual
  request_delay_seconds: [2, 6]  # delay aleatório entre pedidos
  silent_block_threshold: 3      # corridas seguidas com 0 vistos -> alerta
  daily_digest_hour: 22          # hora (local) do resumo diário / heartbeat
  timezone: "Europe/Lisbon"
  notify_price_drops: true
  min_price_drop_pct: 1.0        # ignora baixas < 1% (só atualiza o preço em silêncio)
  history_days: 30               # dias de eventos guardados p/ dashboard
  max_listings_per_message: 20   # tecto de cards por notificação
  dashboard_url: "https://ruimvrnunes.github.io/Imoveis_disponiveis/"              # ex: https://<user>.github.io/<repo>/ (aparece nas mensagens)
  quiet_hours: [1, 8]            # sem alertas entre as 1h e as 8h; acumulam
                                 # e chegam juntos na primeira corrida da manhã.
                                 # [0, 0] desliga as horas de silêncio.
  # Controlo de quota do idealista_api (API paga por pedido):
  min_interval_hours: { idealista_api: 6 }   # só corre no máx. 1x/6h -> 4x/dia
  idealista_urls_per_run: 1                  # trata de 1 concelho por corrida (roda)
  rapidapi_monthly_cap: 140                  # trava de segurança; mete o teu limite real
  # Conta com estes valores: 1 URL/corrida x 4 corridas/dia = 4 pedidos/dia ≈
  # 120/mês (cabe em 150). Com 6 concelhos, cada um é revisto a cada ~36h.
  # Se o teu plano der mais, sobe idealista_urls_per_run ou baixa o intervalo:
  #   pedidos/dia = idealista_urls_per_run x (24 / min_interval_hours[idealista_api])
